name: Backend CI

on:
  push:
    paths:
      - "Backend/**"
  pull_request:
    paths:
      - "Backend/**"

jobs:
  migration-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: horse_marketplace_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d horse_marketplace_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/horse_marketplace_test
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/horse_marketplace_test
      SECRET_KEY: test-secret-key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      BASE_URL: http://localhost:8000
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
      S3_BUCKET_NAME: test-bucket
      S3_PRESIGNED_EXPIRATION: 3600
      SMTP_SERVER: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: test@example.com
      SMTP_PASSWORD: test-password
      EMAIL_FROM: noreply@example.com

    defaults:
      run:
        working-directory: Backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Upgrade clean database
        run: alembic upgrade head

      - name: Downgrade to base
        run: alembic downgrade base

      - name: Re-upgrade after downgrade
        run: alembic upgrade head

  test:
    needs: migration-smoke
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: horse_marketplace_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d horse_marketplace_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/horse_marketplace_test
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/horse_marketplace_test
      SECRET_KEY: test-secret-key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      BASE_URL: http://localhost:8000
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
      S3_BUCKET_NAME: test-bucket
      S3_PRESIGNED_EXPIRATION: 3600
      SMTP_SERVER: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: test@example.com
      SMTP_PASSWORD: test-password
      EMAIL_FROM: noreply@example.com

    defaults:
      run:
        working-directory: Backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest -q --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-xml
          path: Backend/coverage.xml
          if-no-files-found: error
